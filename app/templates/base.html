<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}herokuapp{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">legacy app refresh</div>
          <h1 class="brand"><a href="{{ url_for('index') }}">herokuapp</a></h1>
        </div>
        <nav class="topnav">
          {% if session.get('sid') %}
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('math_view') }}">Math</a>
            <form action="{{ url_for('logout') }}" method="post">
              <button type="submit" class="ghost-button">Logout</button>
            </form>
          {% endif %}
        </nav>
      </header>

      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
