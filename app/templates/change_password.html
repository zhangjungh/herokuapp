{% extends "base.html" %}
{% block title %}Change credentials · herokuapp{% endblock %}
{% block content %}
  <section class="card auth-card">
    <div class="eyebrow">required action</div>
    <h2>Change default credentials</h2>
    <p class="muted">{{ msg }}</p>
    <form method="post" class="stack auth-form">
      <label>
        <span>New username</span>
        <input type="text" name="new_user" autocomplete="username" required>
      </label>
      <label>
        <span>New password</span>
        <input type="password" name="new_passwd" autocomplete="new-password" required>
      </label>
      <label>
        <span>Confirm password</span>
        <input type="password" name="confirm_passwd" autocomplete="new-password" required>
      </label>
      <button type="submit">Save credentials</button>
    </form>
  </section>
{% endblock %}
